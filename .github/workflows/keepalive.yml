name: Supabase keep-alive

# Calls public.keepalive() once a day so the Supabase project's 7-day
# inactivity pause never triggers. Daily is overkill for a 7-day window,
# but GitHub Actions on public repos is unlimited free minutes and a
# missed run won't break anything — the next one will catch up.
#
# Manual trigger also enabled so you can test it without waiting.

on:
  schedule:
    - cron: '17 4 * * *'   # daily at 04:17 UTC
  workflow_dispatch:

# Heads up: GitHub disables scheduled workflows in repos with no commits
# for 60 days. As long as you push occasionally, this keeps running.

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase keepalive RPC
        env:
          SUPABASE_URL:      https://xmbdebavogezqhtkjnbm.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RTQRQ6935sSVGr3CdBp9Sw_qY_UJi1J
        run: |
          set -euo pipefail
          response=$(curl --fail --silent --show-error \
            -X POST "${SUPABASE_URL}/rest/v1/rpc/keepalive" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Supabase responded: ${response}"
          if [ "${response}" != '"pong"' ]; then
            echo "Unexpected response from Supabase keepalive function." >&2
            exit 1
          fi
