<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Family Gallery</title>
  <meta name="description" content="Sign in to the family gallery, or request access if you're a family member.">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="bar">
    <div class="bar-inner">
      <a class="bar-brand" href="../index.html">Dr. Chaitanya Subba</a>
    </div>
  </header>

  <main class="narrow">
    <div class="card">
      <h1>Family Gallery</h1>
      <p>For family members only. Sign in if you already have access, or request access and we'll let you in once it's approved.</p>

      <div class="tabs" role="tablist" aria-label="Sign in or sign up">
        <button id="tab-signin" role="tab" aria-selected="true">Sign in</button>
        <button id="tab-signup" role="tab" aria-selected="false">Request access</button>
      </div>

      <div id="status" class="msg" hidden></div>

      <!-- Sign in form -->
      <form id="form-signin" novalidate>
        <div class="field">
          <label for="signin-email">Email</label>
          <input id="signin-email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="signin-password">Password</label>
          <input id="signin-password" type="password" autocomplete="current-password" required minlength="6">
        </div>
        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
        <p class="hint">
          <button type="button" class="btn-link" id="link-reset">Forgot password?</button>
        </p>
      </form>

      <!-- Sign up form -->
      <form id="form-signup" novalidate hidden>
        <div class="field">
          <label for="signup-name">Your name</label>
          <input id="signup-name" type="text" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="signup-password">Choose a password</label>
          <input id="signup-password" type="password" autocomplete="new-password" required minlength="8">
        </div>
        <button class="btn btn-primary btn-block" type="submit">Request access</button>
        <p class="hint">
          You'll get an email to confirm your address. Access opens once Shreyash approves your request.
        </p>
      </form>
    </div>
  </main>

  <script type="module">
    import { signIn, signUp, sendPasswordReset, getProfile } from './assets/auth.js';

    const tabSignin = document.getElementById('tab-signin');
    const tabSignup = document.getElementById('tab-signup');
    const formSignin = document.getElementById('form-signin');
    const formSignup = document.getElementById('form-signup');
    const status = document.getElementById('status');
    const linkReset = document.getElementById('link-reset');

    // If already signed in, route based on status
    (async () => {
      const profile = await getProfile();
      if (!profile) return;
      if (profile.status === 'pending')  location.replace('pending.html');
      else if (profile.status === 'approved' || profile.status === 'admin') location.replace('index.html');
      else if (profile.status === 'disabled') showStatus('error', 'This account has been disabled.');
    })();

    function showStatus(kind, text) {
      status.hidden = false;
      status.className = `msg msg-${kind}`;
      status.textContent = text;
    }
    function clearStatus() { status.hidden = true; status.textContent = ''; }

    function setMode(mode) {
      const isSignin = mode === 'signin';
      tabSignin.setAttribute('aria-selected', String(isSignin));
      tabSignup.setAttribute('aria-selected', String(!isSignin));
      formSignin.hidden = !isSignin;
      formSignup.hidden = isSignin;
      clearStatus();
    }
    tabSignin.addEventListener('click', () => setMode('signin'));
    tabSignup.addEventListener('click', () => setMode('signup'));

    formSignin.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const btn = e.submitter; btn.disabled = true;
      try {
        const { error } = await signIn({ email, password });
        if (error) throw error;
        const profile = await getProfile();
        if (!profile)                       throw new Error('Could not load profile.');
        if (profile.status === 'pending')   location.replace('pending.html');
        else if (profile.status === 'disabled') showStatus('error', 'This account has been disabled.');
        else                                location.replace('index.html');
      } catch (err) {
        showStatus('error', err.message || 'Sign-in failed.');
      } finally {
        btn.disabled = false;
      }
    });

    formSignup.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();
      const fullName = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn = e.submitter; btn.disabled = true;
      try {
        const { error } = await signUp({ email, password, fullName });
        if (error) throw error;
        showStatus('success', 'Check your inbox for a confirmation email. Once confirmed, you\'ll be in the queue for approval.');
        formSignup.reset();
      } catch (err) {
        showStatus('error', err.message || 'Sign-up failed.');
      } finally {
        btn.disabled = false;
      }
    });

    linkReset.addEventListener('click', async () => {
      const email = document.getElementById('signin-email').value.trim();
      if (!email) { showStatus('info', 'Enter your email above first.'); return; }
      try {
        const { error } = await sendPasswordReset(email);
        if (error) throw error;
        showStatus('success', 'Password reset email sent.');
      } catch (err) {
        showStatus('error', err.message || 'Could not send reset email.');
      }
    });
  </script>

</body>
</html>
